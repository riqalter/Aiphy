services:
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aiphy-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - API_URL=http://api:4000
    depends_on:
      - api
    restart: always

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiphy-backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://aiphy_user:aiphy_password@db:5432/aiphy_db
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - uploads_data:/app/uploads
    depends_on:
      - db
      - redis
    restart: always

  db:
    image: postgres:15-alpine
    container_name: aiphy-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=aiphy_user
      - POSTGRES_PASSWORD=aiphy_password
      - POSTGRES_DB=aiphy_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: aiphy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  python-sandbox:
    build:
      context: ./backend
      dockerfile: sandbox/Dockerfile.python
    container_name: aiphy-sandbox
    command: tail -f /dev/null
    network_mode: none
    restart: always

volumes:
  postgres_data:
  redis_data:
  uploads_data:
